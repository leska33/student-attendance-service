spring:
  sql:
    init:
      mode: never

  datasource:
    url: jdbc:h2:mem:student_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE
    username: sa
    password:
